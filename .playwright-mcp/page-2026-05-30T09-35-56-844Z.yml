              - paragraph [ref=e239]: "The optimal climbing windows differ significantly between the two mountains:"
              - heading "Kilimanjaro Climbing Seasons" [level=3] [ref=e240]
              - paragraph [ref=e241]:
                - text: Kilimanjaro can be climbed year-round, but the
                - link "best months" [ref=e242] [cursor=pointer]:
                  - /url: /best-time-to-climb-kilimanjaro/
                - text: "fall into two dry seasons:"
              - list [ref=e243]:
                - listitem [ref=e244]:
                  - generic [ref=e246]:
                    - generic [ref=e247]: Peak season (June–October)
                    - generic [ref=e248]: Dry, cold nights, clear skies. Busiest period but highest summit success rates.
                - listitem [ref=e249]:
                  - generic [ref=e251]:
                    - generic [ref=e252]: Second season (January–March)
                    - generic [ref=e253]: Warmer days, slightly more rain risk but fewer crowds. Our guides report comparable success rates to peak season on 7+ day routes.
                - listitem [ref=e254]:
                  - generic [ref=e256]:
                    - generic [ref=e257]: Shoulder months (November, April–May)
                    - generic [ref=e258]: Possible but wetter. Lower prices and very quiet trails.
              - heading "Everest Base Camp Trekking Seasons" [level=3] [ref=e259]
              - list [ref=e260]:
                - listitem [ref=e261]:
                  - generic [ref=e263]:
                    - generic [ref=e264]: Spring (March–May)
                    - generic [ref=e265]: Warmer temperatures, rhododendron blooms, clearer views before monsoon.
                - listitem [ref=e266]:
                  - generic [ref=e268]:
                    - generic [ref=e269]: Autumn (September–November)
                    - generic [ref=e270]: Post-monsoon clarity, stable weather, most popular season.
              - heading "Everest Summit Window" [level=3] [ref=e271]
              - paragraph [ref=e272]: The summit window is extremely narrow — most successful summit attempts happen in a 2–3 week period in May when the jet stream lifts temporarily. A secondary window exists in September–October but is used far less frequently.
              - heading "Accommodation and Logistics" [level=2] [ref=e273]
              - paragraph [ref=e274]: "The day-to-day experience on each mountain is surprisingly different:"
              - 'heading "Kilimanjaro: Full-Service Camping" [level=3] [ref=e275]'
              - paragraph [ref=e276]: On Kilimanjaro, your operator provides everything. A typical group of 4 climbers will have 15–20 support crew including guides, cooks, and porters who carry all equipment. You sleep in tents at designated campsites, eat hot meals prepared by a dedicated cook, and carry only a daypack. The camping experience is well-organized — you arrive at camp to find your tent set up and hot tea waiting.
              - 'heading "Everest Base Camp: Tea House Trekking" [level=3] [ref=e277]'
              - paragraph [ref=e278]: The EBC trek uses Nepal's famous tea house (lodge) system. You sleep in basic but comfortable lodges along the trail, eat in communal dining rooms, and can buy snacks and supplies at small shops. There's a social, community atmosphere. You carry your own pack or hire a porter.
              - 'heading "Everest Summit: Expedition-Style" [level=3] [ref=e279]'
              - paragraph [ref=e280]: A full Everest expedition involves weeks at base camp (a small tent city), followed by rotations to progressively higher camps. You'll spend significant time waiting for weather windows. Life at base camp includes a mess tent, cook, and communication equipment.
              - heading "Scenery and Experience Compared" [level=2] [ref=e281]
              - paragraph [ref=e282]: "Both mountains deliver extraordinary experiences, but the character of each journey is distinct:"
              - 'heading "Kilimanjaro: Five Climate Zones in One Week" [level=3] [ref=e283]'
              - paragraph [ref=e284]: "Kilimanjaro is unique among the world's great mountains for the diversity of ecosystems you traverse. In 5–9 days you pass through:"
              - list [ref=e285]:
                - listitem [ref=e286]:
                  - strong [ref=e287]: Cultivation zone
                  - text: – Banana plantations and coffee farms at the base
                - listitem [ref=e288]:
                  - strong [ref=e289]: Rainforest
                  - text: – Dense montane forest with colobus monkeys and exotic birds
                - listitem [ref=e290]:
                  - strong [ref=e291]: Heath and moorland
                  - text: – Giant heathers and otherworldly lobelia plants
                - listitem [ref=e292]:
                  - strong [ref=e293]: Alpine desert
                  - text: – Barren, Mars-like volcanic landscape
                - listitem [ref=e294]:
                  - strong [ref=e295]: Arctic summit zone
                  - text: – Glaciers and ice fields at the roof of Africa
              - paragraph [ref=e296]: This ecological diversity means every day looks completely different — something no other mountain on Earth offers in such compressed vertical distance.
              - 'heading "Everest Base Camp: Himalayan Culture and Grandeur" [level=3] [ref=e297]'
              - paragraph [ref=e298]: The EBC trek is as much a cultural journey as a physical one. You walk through Sherpa villages, visit Buddhist monasteries (including the famous Tengboche Monastery), cross dramatic suspension bridges, and are surrounded by 8,000m giants — Lhotse, Nuptse, Ama Dablam, and Everest itself. The Himalayan scale is staggering and nothing else on Earth matches it.
