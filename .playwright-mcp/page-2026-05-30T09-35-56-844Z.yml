              - paragraph [ref=e345]: Everest Base Camp, by contrast, has essentially one trail — the classic Lukla-to-EBC route through the Khumbu Valley. There are minor variations (like the Gokyo Lakes detour), but the core path is the same for everyone.
              - paragraph [ref=e346]: This means Kilimanjaro lets you tailor the experience to your fitness level, budget, and preference for crowds — something the EBC trek doesn't offer.
              - heading "Permits and Bureaucracy" [level=2] [ref=e347]
              - heading "Kilimanjaro" [level=3] [ref=e348]
              - paragraph [ref=e349]: Straightforward. Park fees ($70/day for adults) are included in your operator's package price. Your climbing company handles all permits, registration, and park formalities. You need a valid passport and a Tanzania visa (available on arrival for most nationalities, ~$50). There's minimal paperwork on your end — one of Kilimanjaro's advantages for first-time international trekkers.
              - heading "Everest Base Camp" [level=3] [ref=e350]
              - paragraph [ref=e351]: You'll need a TIMS card (Trekkers' Information Management System) and a Sagarmatha National Park entry permit. These are typically arranged by your trekking agency in Kathmandu. Total permit costs are under $100. You'll also need a Nepal visa.
              - heading "Everest Summit" [level=3] [ref=e352]
              - paragraph [ref=e353]: This is where bureaucracy becomes expensive. The climbing permit alone is $11,000 per person (issued by Nepal's government). Your expedition operator handles liaison officer requirements, icefall doctor fees, and various deposits. The permit process requires months of advance planning and paperwork.
