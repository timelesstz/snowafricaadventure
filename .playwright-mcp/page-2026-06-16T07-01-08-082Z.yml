        - generic [ref=e253]:
          - generic [ref=e254]: Altitude Ecosystems
          - heading "Five Climate Zones of Mount Kilimanjaro" [level=2] [ref=e255]
          - paragraph [ref=e256]: Climbing Kilimanjaro is like travelling from the equator to the Arctic — the mountain's altitude spans five distinct ecological zones, each with unique flora, fauna, and weather conditions.
          - generic [ref=e257]:
            - generic [ref=e258]:
              - img [ref=e260]
              - generic [ref=e262]:
                - generic [ref=e263]:
                  - heading "Cultivated Zone" [level=3] [ref=e264]
                  - generic [ref=e265]: 800 – 1,800m
                  - generic [ref=e266]: 20–30°C
                - paragraph [ref=e267]: The fertile lower slopes where the Chagga people grow coffee, bananas, and maize. Rich volcanic soil makes this region incredibly productive. Most climbers pass through this zone by vehicle on their way to the park gate.
            - generic [ref=e268]:
              - img [ref=e270]
              - generic [ref=e273]:
                - generic [ref=e274]:
                  - heading "Montane Forest" [level=3] [ref=e275]
                  - generic [ref=e276]: 1,800 – 2,800m
                  - generic [ref=e277]: 12–20°C
                - paragraph [ref=e278]: Lush rainforest with towering trees, mosses, and diverse wildlife. Black-and-white colobus monkeys, blue monkeys, and buffalo inhabit this zone. It receives the most rainfall and is often misty — expect muddy trails.
            - generic [ref=e279]:
              - img [ref=e281]
              - generic [ref=e284]:
                - generic [ref=e285]:
                  - heading "Heath & Moorland" [level=3] [ref=e286]
                  - generic [ref=e287]: 2,800 – 4,000m
                  - generic [ref=e288]: 5–15°C
                - paragraph [ref=e289]: Giant heather and unique endemic species like giant lobelias, groundsels, and the famous Senecio kilimanjari define this otherworldly landscape. Temperatures drop significantly at night and clouds often settle below you.
            - generic [ref=e290]:
              - img [ref=e292]
              - generic [ref=e294]:
                - generic [ref=e295]:
                  - heading "Alpine Desert" [level=3] [ref=e296]
                  - generic [ref=e297]: 4,000 – 5,000m
                  - generic [ref=e298]: "-5–15°C"
                - paragraph [ref=e299]: A barren, Mars-like landscape with extreme temperature swings — scorching sun by day, well below freezing at night. Vegetation is sparse, the air is noticeably thinner, and acclimatisation becomes critical. Most high camps sit in this zone.
            - generic [ref=e300]:
              - img [ref=e302]
              - generic [ref=e304]:
                - generic [ref=e305]:
                  - heading "Arctic Summit" [level=3] [ref=e306]
                  - generic [ref=e307]: 5,000 – 5,895m
                  - generic [ref=e308]: "-15–-25°C"
                - paragraph [ref=e309]: Ice fields, glaciers, and sub-zero temperatures characterise the summit zone. Oxygen is roughly 50% of sea level. Uhuru Peak crowns this otherworldly environment — and the glaciers here have lost over 80% of their mass since 1912.
        - generic [ref=e312]:
          - generic [ref=e313]: Geography
          - heading "Why Mount Kilimanjaro is the World's Most Accessible High-Altitude Summit" [level=2] [ref=e314]
          - generic [ref=e315]:
            - generic [ref=e316]:
              - img [ref=e318]
              - heading "Free-Standing Mountain" [level=3] [ref=e320]
              - paragraph [ref=e321]:
                - text: Unlike
                - link "Everest" [ref=e322] [cursor=pointer]:
                  - /url: /kilimanjaro-vs-everest/
                - text: ", which belongs to a range, Kilimanjaro rises in dramatic isolation from the surrounding savannah — a full 5,885m of topographic prominence."
            - generic [ref=e323]:
              - img [ref=e325]
              - heading "Fastest Elevation Gain" [level=3] [ref=e328]
              - paragraph [ref=e329]: Trekkers gain nearly 4,000m in elevation over 5–8 days — one of the steepest altitude gains of any high-altitude trek on Earth, making acclimatisation critical.
            - generic [ref=e330]:
              - img [ref=e332]
              - heading "No Technical Skills Needed" [level=3] [ref=e334]
              - paragraph [ref=e335]: Kilimanjaro is accessible to non-technical climbers. No ropes, ice axes, or specialist training are required — making it the most achievable of the Seven Summits.
        - generic [ref=e338]:
          - generic [ref=e339]: Geology
          - heading "Kilimanjaro's Three Volcanic Cones" [level=2] [ref=e340]
          - paragraph [ref=e341]: Kilimanjaro is a stratovolcano comprised of three distinct volcanic cones formed at different times. Only Kibo — the highest — retains any volcanic activity, with fumaroles still emitting gases inside its crater.
          - generic [ref=e342]:
            - generic [ref=e343]:
              - generic [ref=e344]:
                - heading "Kibo" [level=3] [ref=e345]
                - generic [ref=e346]: Dormant
              - paragraph [ref=e347]: 5,895m (19,341ft)
              - paragraph [ref=e348]: The highest and youngest cone, home to Uhuru Peak. Kibo is dormant but not extinct — fumaroles still emit gases in its crater.
            - generic [ref=e349]:
              - generic [ref=e350]:
                - heading "Mawenzi" [level=3] [ref=e351]
                - generic [ref=e352]: Extinct
              - paragraph [ref=e353]: 5,149m (16,893ft)
              - paragraph [ref=e354]: The second highest cone with dramatic jagged peaks. Technical climbing skills are required to summit Mawenzi.
            - generic [ref=e355]:
