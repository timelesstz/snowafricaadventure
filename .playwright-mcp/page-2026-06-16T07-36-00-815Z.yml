              - heading "The Bottom Line" [level=2] [ref=e355]
              - paragraph [ref=e356]: There's no single "best" time for African safari—it depends entirely on what you want to experience, where you want to go, and what constraints you face. The dry season offers the most predictable wildlife viewing across the continent, but every season has unique rewards for those who embrace them.
              - paragraph [ref=e357]: Work with a knowledgeable safari operator to match your interests with the optimal timing and destinations for your dream African adventure.
              - heading "Frequently Asked Questions" [level=2] [ref=e358]
              - heading "Does the best safari time differ between East Africa and Southern Africa?" [level=3] [ref=e359]
              - paragraph [ref=e360]: Yes, the seasons are somewhat different. East Africa's dry season runs June to October and January to February. Southern Africa's dry season is May to October with peak game viewing from July to September. The Okavango Delta floods from June to August creating unique water-based safari experiences. Research your specific destination's seasonal patterns rather than relying on general Africa-wide advice.
              - heading "Is the rainy season a bad time for an African safari?" [level=3] [ref=e361]
              - paragraph [ref=e362]: Not necessarily. The green season offers lush scenery, newborn animals, spectacular birdwatching, dramatic storm skies for photography, and significantly lower prices. Some parks are inaccessible during heavy rains, but many remain fully operational. The Serengeti calving season in February is technically rainy season yet is one of the most spectacular wildlife events of the entire year.
              - heading "How far in advance should I book an African safari?" [level=3] [ref=e363]
              - paragraph [ref=e364]: Book 6-12 months ahead for peak season travel from July to October, especially for popular lodges in the Serengeti, Masai Mara, and Okavango Delta. Green season trips can be booked 3-6 months out with better availability. Last-minute deals exist but limit your choices significantly. Christmas and New Year safaris should be booked 12 months in advance due to extreme demand.
              - 'heading "Budget vs Luxury: When Safari Prices Drop" [level=2] [ref=e365]'
              - paragraph [ref=e366]: "Safari pricing follows predictable seasonal patterns across Africa. High season (June–October in most regions) brings premium rates — lodges charge 40–60% more than low season. But shoulder seasons offer a sweet spot: lower prices with reasonable wildlife viewing."
              - list [ref=e367]:
                - listitem [ref=e368]:
                  - generic [ref=e370]:
                    - generic [ref=e371]: Best budget months
                    - generic [ref=e372]: "April–May (green season) in Tanzania and Kenya — rates drop 30–50%, parks are empty, and birdlife is exceptional. The downside: some roads become difficult and short afternoon rains are common."
                - listitem [ref=e373]:
                  - generic [ref=e375]:
                    - generic [ref=e376]: Best value months
                    - generic [ref=e377]: November and March — shoulder seasons with good wildlife, moderate prices, and fewer crowds than peak season. These months often deliver the best overall experience for the price.
                - listitem [ref=e378]:
                  - generic [ref=e380]:
                    - generic [ref=e381]: Peak premium months
                    - generic [ref=e382]: July–September — the Great Migration river crossings drive highest demand. Book 6–12 months ahead for the best camps.
              - paragraph [ref=e383]: Southern Africa follows a similar pattern — May and November are shoulder months with good value. Namibia's green season (January–April) offers dramatic landscapes and lower rates, though some desert-adapted wildlife disperses.
