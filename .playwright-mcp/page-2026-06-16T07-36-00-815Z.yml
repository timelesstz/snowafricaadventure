              - heading "Frequently Asked Questions" [level=2] [ref=e389]
              - heading "What is the best month for an African safari?" [level=3] [ref=e390]
              - paragraph [ref=e391]: July through September is widely considered the best time across most of Africa. In East Africa, the dry season concentrates wildlife around water sources, and the Great Migration river crossings peak in the Serengeti and Masai Mara. In Southern Africa, winter (June–August) brings the driest conditions and best game viewing in Botswana, Zimbabwe, and Zambia.
              - heading "Is dry season or wet season better for safari?" [level=3] [ref=e392]
              - paragraph [ref=e393]: Dry season (June–October in most regions) is better for wildlife spotting — animals gather at remaining water sources and vegetation thins out, making them easier to see. Wet season (November–May) brings lush landscapes, newborn animals, exceptional birdlife, and lower prices — but some roads become impassable and animals disperse widely.
              - heading "How much does an African safari cost?" [level=3] [ref=e394]
              - paragraph [ref=e395]: Budget safaris in Tanzania and Kenya start from $150–250 per person per day for camping-based trips. Mid-range lodge safaris run $300–500 per day. Luxury and fly-in safaris in Botswana, Tanzania's private concessions, or Rwanda's gorilla treks range from $600 to $2,000+ per day. The biggest cost factors are accommodation level, season, and whether you fly between parks or drive.
              - heading "What is the best country for a first safari?" [level=3] [ref=e396]
              - paragraph [ref=e397]: "Tanzania and Kenya are the best countries for a first-time safari. Both offer reliable year-round wildlife, well-established tourism infrastructure, English-speaking guides, and diverse experiences — from the Serengeti's endless plains to Ngorongoro Crater's concentrated wildlife. Tanzania edges ahead for variety: you can combine safari with Kilimanjaro trekking, Zanzibar beaches, and cultural visits in a single trip."
              - heading "Can you see the Big Five year-round in Africa?" [level=3] [ref=e398]
              - paragraph [ref=e399]: Yes, the Big Five (lion, leopard, elephant, rhino, buffalo) are resident year-round in parks like the Serengeti, Ngorongoro Crater, Kruger, and the Okavango Delta. However, sighting probability improves in dry season when vegetation thins out and animals concentrate near water. Rhinos are the hardest to spot regardless of season — Ngorongoro Crater offers the best chances in East Africa.
              - heading "Is it safe to go on safari in Africa?" [level=3] [ref=e400]
              - paragraph [ref=e401]: Safari tourism is very safe when booked with reputable operators. Tanzania, Kenya, Botswana, South Africa, and Namibia have well-established tourism industries with strict safety standards. You'll be accompanied by trained guides in national parks, and accommodation ranges from secure lodges to fenced camps. The main risks — sunburn, dehydration, and motion sickness on bumpy roads — are easily managed with preparation.
