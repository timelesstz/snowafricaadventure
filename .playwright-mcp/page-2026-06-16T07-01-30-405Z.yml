          - paragraph [ref=e181]:
            - text: Kilimanjaro is a
            - strong [ref=e182]: physically demanding, non-technical high-altitude trek
            - text: . You don't need climbing skills — no ropes or harnesses. The real challenges are
            - strong [ref=e183]: altitude (50% oxygen at the summit)
            - text: ","
            - strong [ref=e184]: extreme cold (-20°C on summit night)
            - text: ", and"
            - strong [ref=e185]: mental determination during the midnight summit push
            - text: . With proper preparation and a 7+ day route, most fit adults can reach the top. Our summit success rate is 93%.
