              - heading "Altitude" [level=3] [ref=e198]
              - paragraph [ref=e199]: The single biggest challenge. At 5,895m, oxygen levels are roughly 50% of sea level. Altitude sickness affects most climbers to some degree above 3,500m. Proper acclimatization (choosing a 7+ day route) is the key to managing this.
            - generic [ref=e200]:
              - generic [ref=e201]:
                - img [ref=e203]
                - generic [ref=e208]: Moderate-Hard
              - heading "Cold & Weather" [level=3] [ref=e209]
              - paragraph [ref=e210]: Summit night temperatures drop to -15°C to -25°C with wind chill. You'll walk through tropical rainforest, alpine desert, and finally across glaciers and snow fields at the summit. Proper layering makes this manageable.
            - generic [ref=e211]:
              - generic [ref=e212]:
                - img [ref=e214]
                - generic [ref=e217]: Moderate
              - heading "Duration & Endurance" [level=3] [ref=e218]
              - paragraph [ref=e219]: You'll hike 5-8 hours per day for 5-9 days. The summit push is 12-15 hours of continuous walking. This requires cardiovascular fitness and mental stamina — but the pace is slow (pole pole).
            - generic [ref=e220]:
              - generic [ref=e221]:
                - img [ref=e223]
                - generic [ref=e226]: Easy
              - heading "Technical Difficulty" [level=3] [ref=e227]
              - paragraph [ref=e228]: Kilimanjaro requires zero technical climbing skills. No ropes, harnesses, crampons, or ice axes needed. The Barranco Wall on the Machame/Lemosho routes involves hands-on scrambling but is not technical. It is a walk-up mountain.
            - generic [ref=e229]:
              - generic [ref=e230]:
                - img [ref=e232]
                - generic [ref=e234]: Hard
              - heading "Mental Toughness" [level=3] [ref=e235]
              - paragraph [ref=e236]: Summit night is the hardest part — walking uphill in freezing darkness for 6-7 hours with reduced oxygen. Many climbers who fail are physically capable but give up mentally. Preparing for this mental challenge is as important as physical training.
            - generic [ref=e237]:
              - generic [ref=e238]:
                - img [ref=e240]
                - generic [ref=e245]: Moderate
              - heading "Physical Fitness Required" [level=3] [ref=e246]
              - paragraph [ref=e247]: You need to be able to hike 6-8 hours with a daypack comfortably. You don't need to be an athlete — regular walkers, runners, and gym-goers can do Kilimanjaro with 2-3 months of focused preparation.
