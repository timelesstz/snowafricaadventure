              - heading "How Much Does It Cost to Climb Mount Meru?" [level=2] [ref=e286]
              - paragraph [ref=e287]: "Mount Meru is significantly more affordable than Kilimanjaro. Here is a typical cost breakdown for a 4-day climb:"
              - list [ref=e288]:
                - listitem [ref=e289]:
                  - generic [ref=e291]:
                    - generic [ref=e292]: Park fees
