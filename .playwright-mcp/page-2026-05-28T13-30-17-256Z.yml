          - heading "Terms and Conditions" [level=1] [ref=e703]
          - paragraph [ref=e704]: "Last updated: January 2025"
        - generic [ref=e707]:
          - paragraph [ref=e708]: These terms and conditions govern your use of Snow Africa Adventure services and website. By booking with us, you agree to these terms.
          - heading "1. Booking and Confirmation" [level=2] [ref=e709]
          - paragraph [ref=e710]: A booking is confirmed once we receive your deposit and send you a written confirmation. Please review your confirmation carefully and notify us of any errors within 48 hours.
          - list [ref=e711]:
            - listitem [ref=e712]: "Kilimanjaro climbs: 10% deposit required at booking, balance due 30 days before departure"
            - listitem [ref=e713]: "Safari packages: 30% deposit required at booking, balance due 30 days before departure"
            - listitem [ref=e714]: "Day trips: Full payment required at booking"
            - listitem [ref=e715]: "Group departures: 10% deposit to secure your spot, balance due 45 days before departure"
          - heading "2. Payment Methods" [level=2] [ref=e716]
          - paragraph [ref=e717]: "We accept the following payment methods:"
          - list [ref=e718]:
            - listitem [ref=e719]: Bank transfer (USD)
            - listitem [ref=e720]: Credit/debit card (Visa, Mastercard) - 3% processing fee
            - listitem [ref=e721]: PayPal - 4% processing fee
            - listitem [ref=e722]: Cash (USD) upon arrival
          - paragraph [ref=e723]: All prices are quoted in US Dollars (USD) unless otherwise stated. Payments in other currencies will be converted at the prevailing exchange rate.
          - heading "3. Cancellation Policy" [level=2] [ref=e724]
          - paragraph [ref=e725]: "We understand plans can change. Our cancellation policy is as follows:"
          - heading "Kilimanjaro Climbs & Safaris" [level=3] [ref=e726]
          - list [ref=e727]:
            - listitem [ref=e728]: "More than 60 days before departure: Full refund minus $100 admin fee"
            - listitem [ref=e729]: "31-60 days before departure: 50% refund"
            - listitem [ref=e730]: "15-30 days before departure: 25% refund"
            - listitem [ref=e731]: "Less than 15 days before departure: No refund"
          - heading "Group Departures" [level=3] [ref=e732]
          - list [ref=e733]:
            - listitem [ref=e734]: "More than 60 days: Full refund minus $100 admin fee"
            - listitem [ref=e735]: "45-60 days: 70% refund"
            - listitem [ref=e736]: "30-44 days: 50% refund"
            - listitem [ref=e737]: "Less than 30 days: No refund"
          - heading "Day Trips" [level=3] [ref=e738]
          - list [ref=e739]:
            - listitem [ref=e740]: "More than 48 hours: Full refund"
            - listitem [ref=e741]: "24-48 hours: 50% refund"
            - listitem [ref=e742]: "Less than 24 hours: No refund"
          - paragraph [ref=e743]:
            - text: Cancellations must be made in writing via email to
            - link "info@snowafricaadventure.com" [ref=e744] [cursor=pointer]:
              - /url: mailto:info@snowafricaadventure.com
            - text: .
          - heading "4. Changes and Amendments" [level=2] [ref=e745]
          - paragraph [ref=e746]: We will do our best to accommodate changes to your booking. Amendment requests made more than 30 days before departure are subject to a $50 admin fee plus any supplier charges. Changes within 30 days may not be possible and may be treated as cancellations.
          - heading "5. Travel Insurance" [level=2] [ref=e747]
          - paragraph [ref=e748]:
            - strong [ref=e749]: Travel insurance is mandatory for all Kilimanjaro climbs and strongly recommended for all other activities.
            - text: Your insurance must cover emergency evacuation, trip cancellation, medical expenses, and personal belongings.
          - paragraph [ref=e750]: For Kilimanjaro climbs, your policy must specifically cover trekking/mountaineering up to 6,000 meters altitude and emergency helicopter evacuation.
          - heading "6. Health and Fitness" [level=2] [ref=e751]
          - paragraph [ref=e752]: You are responsible for ensuring you are physically fit and healthy for your chosen activity. For Kilimanjaro climbs, we recommend consulting a doctor before booking, especially if you have any pre-existing medical conditions.
          - paragraph [ref=e753]: You must disclose any medical conditions that may affect your ability to participate safely. Our guides reserve the right to prevent anyone from continuing if they believe it poses a safety risk.
          - heading "7. Itinerary Changes" [level=2] [ref=e754]
          - paragraph [ref=e755]: While we make every effort to follow the planned itinerary, changes may be necessary due to weather, road conditions, wildlife movements, park regulations, or other factors beyond our control. We reserve the right to modify itineraries to ensure safety and maximize your experience.
          - paragraph [ref=e756]: No refunds will be given for itinerary changes caused by circumstances beyond our control.
          - heading "8. Liability" [level=2] [ref=e757]
          - paragraph [ref=e758]: Snow Africa Adventure acts as an agent for various suppliers (hotels, lodges, transport, etc.) and is not liable for any loss, damage, injury, or death arising from services provided by these suppliers.
          - paragraph [ref=e759]: We are not responsible for delays, changes, or cancellations caused by weather, political instability, natural disasters, pandemic, or other force majeure events.
          - paragraph [ref=e760]: Our maximum liability is limited to the total amount paid for your trip.
          - heading "9. Complaints" [level=2] [ref=e761]
          - paragraph [ref=e762]: If you have any issues during your trip, please inform your guide immediately so we can address them on the spot. If you wish to file a formal complaint, please do so in writing within 14 days of your trip completion.
          - heading "10. Photography and Marketing" [level=2] [ref=e763]
          - paragraph [ref=e764]: We may take photographs during your trip for marketing purposes. If you do not wish to be photographed, please inform your guide at the start of your trip. By participating in our activities, you grant us permission to use photos containing your likeness for promotional purposes unless you opt out.
          - heading "11. Environmental Responsibility" [level=2] [ref=e765]
          - paragraph [ref=e766]: We are committed to responsible tourism. All participants must respect wildlife, local communities, and the environment. Littering, feeding wildlife, or engaging in any activity that harms the environment or local culture is strictly prohibited and may result in immediate termination of your trip without refund.
          - heading "12. Governing Law" [level=2] [ref=e767]
          - paragraph [ref=e768]: These terms are governed by the laws of the United Republic of Tanzania. Any disputes shall be resolved through arbitration in Arusha, Tanzania.
          - heading "Contact Information" [level=2] [ref=e769]
          - paragraph [ref=e770]: "For questions about these terms, please contact us:"
          - list [ref=e771]:
            - listitem [ref=e772]: "Email: info@snowafricaadventure.com"
            - listitem [ref=e773]: "Phone: +255 766 657 854"
            - listitem [ref=e774]: "Address: MEC House, Plot no 161, Second floor, Mianzini Area, Arusha, Tanzania"
