              - paragraph [ref=e230]:
                - emphasis [ref=e231]: Timing varies by 2–4 weeks each year depending on rainfall patterns. Contact us for real-time migration updates before booking.
              - heading "Frequently Asked Questions" [level=2] [ref=e232]
              - heading "When is the best time to see the Great Migration?" [level=3] [ref=e233]
              - paragraph [ref=e234]: The most dramatic spectacle — the Mara River crossings — occurs from July through September in the northern Serengeti (Kogatende area). However, the migration happens year-round. Calving season (January–March) in the southern Serengeti offers equally compelling wildlife viewing with thousands of newborns and predator action. The "best" time depends on which part of the migration you want to witness.
              - heading "Where do wildebeest cross the Mara River?" [level=3] [ref=e235]
              - paragraph [ref=e236]: The main crossing points are in the northern Serengeti near Kogatende and along the Mara River on both the Tanzania and Kenya sides. There are several established crossing points, but the herds may choose different locations each time based on water levels and predator presence. River crossings are unpredictable — herds may approach, hesitate for hours, then suddenly surge across, or turn back entirely. Positioning yourself at a known crossing point with a good guide gives you the best chance.
              - heading "How many animals are in the Great Migration?" [level=3] [ref=e237]
              - paragraph [ref=e238]: "The Great Migration involves approximately 1.5 million wildebeest, 400,000 zebra, and 200,000 Thomson's gazelle — over 2 million animals in total. It is the largest overland wildlife migration on Earth. Along the way, the herds are trailed by predators: lions, cheetahs, leopards, hyenas, and crocodiles that wait at river crossings."
              - heading "How far do wildebeest migrate each year?" [level=3] [ref=e239]
              - paragraph [ref=e240]: The herds travel approximately 800 to 1,000 kilometres (500–620 miles) annually in a roughly clockwise loop between the southern Serengeti in Tanzania and the Masai Mara in Kenya. The exact route and timing vary each year based on rainfall patterns — the herds follow the fresh grass that grows after rains.
              - heading "Can you see the Great Migration from Kenya?" [level=3] [ref=e241]
              - paragraph [ref=e242]: Yes. From approximately August to October, large portions of the herds cross into Kenya's Masai Mara National Reserve, and dramatic Mara River crossings happen on both sides of the border. However, the migration spends the majority of the year (roughly 9–10 months) on the Tanzania side in the Serengeti. For the full migration experience across multiple months, Tanzania offers more flexibility.
