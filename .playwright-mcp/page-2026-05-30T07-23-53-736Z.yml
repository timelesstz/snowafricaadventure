              - heading "Mount Kilimanjaro — Africa's Most Famous Snow-Capped Peak" [level=2] [ref=e172]
              - paragraph [ref=e173]:
                - text: Standing at 5,895 meters,
                - link "Mount Kilimanjaro" [ref=e174] [cursor=pointer]:
                  - /url: /climbing-kilimanjaro/
                - text: is Africa's tallest mountain and the highest free-standing mountain in the world. Its summit glaciers have existed for approximately 11,700 years, creating an otherworldly landscape of ice walls, glacial formations, and snow fields just 340 kilometres from the equator.
              - paragraph [ref=e175]: "The main glacial zones on Kilimanjaro include:"
              - list [ref=e176]:
                - listitem [ref=e177]:
                  - strong [ref=e178]: The Northern Icefield
                  - text: – the largest remaining ice mass on the mountain
                - listitem [ref=e179]:
                  - strong [ref=e180]: The Southern Icefield
                  - text: – includes the famous Kersten Glacier
                - listitem [ref=e181]:
                  - strong [ref=e182]: The Eastern Ice Field
                  - text: – features the Rebmann Glacier
                - listitem [ref=e183]:
                  - strong [ref=e184]: The Furtwängler Glacier
                  - text: – located in the crater near Uhuru Peak
              - paragraph [ref=e185]: Climbers who summit Kilimanjaro walk across snow and ice near the peak, particularly during the early morning summit push when temperatures can drop to −20°C (−4°F). The journey passes through five distinct climate zones — from tropical rainforest at the base to arctic conditions at the summit — making it one of the most unique treks on Earth.
              - paragraph [ref=e186]:
                - text: The
                - link "best time to climb Kilimanjaro" [ref=e187] [cursor=pointer]:
                  - /url: /best-time-to-climb-kilimanjaro/
                - text: for stable weather is during the dry seasons (January–March and June–October), though glaciers and snow are visible year-round at the summit.
              - heading "Mount Kenya — Africa's Second Highest Peak" [level=2] [ref=e188]
              - paragraph [ref=e189]: Africa's second-highest mountain, Mount Kenya at 5,199 meters (17,057 feet), hosts permanent glaciers on its twin peaks — Batian and Nelion. The Lewis Glacier, the mountain's most studied ice mass, has been extensively monitored by climate scientists tracking glacial retreat since the 1890s.
              - paragraph [ref=e190]: Mount Kenya's glaciers are even more vulnerable than Kilimanjaro's. The Lewis Glacier has lost over 90% of its area since 1934, and scientists project it could disappear entirely within the next decade.
              - heading "Rwenzori Mountains — The \"Mountains of the Moon\"" [level=2] [ref=e191]
              - paragraph [ref=e192]: The Rwenzori Mountains, straddling the border between Uganda and the Democratic Republic of Congo, contain Africa's third-highest peak — Mount Stanley at 5,109 meters (16,762 feet). These mountains receive heavy precipitation, creating significant glaciers and permanent snow cover on the upper peaks.
              - paragraph [ref=e193]: Ptolemy called these the "Mountains of the Moon" in his ancient texts, and early explorers sought them for centuries. The Rwenzori's glaciers feed rivers that ultimately contribute to the Nile, making them hydrologically significant beyond their visual spectacle.
              - heading "Simien Mountains — Ethiopia's Frozen Highlands" [level=2] [ref=e194]
              - paragraph [ref=e195]: Ethiopia's Simien Mountains, a UNESCO World Heritage Site, reach 4,550 meters at Ras Dashen — Ethiopia's highest point. While lacking permanent glaciers, the Simien range receives regular snowfall during the cooler months (November–February), blanketing the dramatic escarpments in white.
              - paragraph [ref=e196]: The Simien Mountains are also home to the endemic gelada baboon, Ethiopian wolf, and walia ibex — making them one of the few places on Earth where you can see snow alongside unique African wildlife.
              - heading "Atlas Mountains — Where You Can Ski in Africa" [level=2] [ref=e197]
              - paragraph [ref=e198]: Morocco's Atlas Mountains receive the heaviest reliable snowfall on the continent. Jebel Toubkal, North Africa's highest peak at 4,167 meters (13,671 feet), often requires crampons and ice axes during winter ascents from November through April.
              - paragraph [ref=e199]:
                - text: The Atlas range is also home to
                - strong [ref=e200]: Oukaimeden
                - text: ", Africa's highest ski resort at 3,200 meters — just 80 km from Marrakech. The resort operates chair lifts and attracts skiers from across North Africa and Europe. The contrast of snow-capped mountains visible from the Sahara Desert edge is one of Africa's most striking sights."
              - heading "Drakensberg & Lesotho — Southern Africa's Snow Country" [level=2] [ref=e201]
              - paragraph [ref=e202]: The Drakensberg mountain range, stretching along the South Africa–Lesotho border, receives regular winter snowfall from May through September. Thabana Ntlenyana in Lesotho reaches 3,482 meters and is the highest peak in southern Africa.
              - paragraph [ref=e203]: Lesotho is called the "Kingdom in the Sky" because its entire territory sits above 1,000 meters — making it one of the world's highest countries. Winter snow transforms the highlands into landscapes that look more like the Scottish Highlands than sub-Saharan Africa.
              - paragraph [ref=e204]:
                - strong [ref=e205]: Afriski Mountain Resort
                - text: in Lesotho (altitude 3,222 m) is southern Africa's premier ski and snowboard destination, operating from June through August with groomed runs and snow-making capabilities.
              - heading "Which Countries in Africa Get Snow?" [level=2] [ref=e206]
              - paragraph [ref=e207]: "At least 10 African countries experience snowfall, either regularly or occasionally:"
              - list [ref=e208]:
                - listitem [ref=e209]:
                  - strong [ref=e210]: Tanzania
                  - text: – permanent glaciers on Kilimanjaro
                - listitem [ref=e211]:
                  - strong [ref=e212]: Kenya
                  - text: – permanent glaciers on Mount Kenya
                - listitem [ref=e213]:
