        - generic [ref=e1694]:
          - heading "Tanzania Safari Planning Guide" [level=2] [ref=e1695]
          - paragraph [ref=e1696]:
            - text: Tanzania offers some of the world's most spectacular wildlife viewing opportunities. With 22 national parks, 33 game reserves, and 44 game-controlled areas covering nearly a third of the country, Tanzania protects one of the highest concentrations of wildlife on Earth. Home to the legendary
            - link "Serengeti" [ref=e1697] [cursor=pointer]:
              - /url: /tanzania-destinations/serengeti-national-park/
            - text: ", the stunning"
            - link "Ngorongoro Crater" [ref=e1698] [cursor=pointer]:
              - /url: /tanzania-destinations/ngorongoro-crater/
            - text: ", and the elephant-rich"
            - link "Tarangire" [ref=e1699] [cursor=pointer]:
              - /url: /tanzania-destinations/tarangire-national-park/
            - text: ", a Tanzania safari is the ultimate African adventure."
          - heading "The Great Migration" [level=3] [ref=e1700]
          - paragraph [ref=e1701]: Witness nature's greatest spectacle as over 1.5 million wildebeest, 400,000 zebra, and 200,000 gazelle traverse the Serengeti-Mara ecosystem in a continuous clockwise cycle. This annual migration covers approximately 800 kilometers and offers some of the most dramatic wildlife encounters on the planet.
          - paragraph [ref=e1702]:
            - text: "The migration follows a predictable pattern:"
            - strong [ref=e1703]: January-March
            - text: sees the calving season in the southern Serengeti, where over 500,000 wildebeest calves are born in just a few weeks, attracting predators for spectacular hunting action.
            - strong [ref=e1704]: April-June
            - text: sees the herds moving northwest through the western corridor with dramatic Grumeti River crossings.
            - strong [ref=e1705]: July-October
            - text: brings the famous Mara River crossings in the northern Serengeti — arguably the most iconic wildlife event on Earth.
            - strong [ref=e1706]: November-December
            - text: sees the herds begin their return south.
          - heading "The Big Five" [level=3] [ref=e1707]
          - paragraph [ref=e1708]: "Tanzania is one of the best destinations in Africa to see all of the Big Five: lion, leopard, elephant, Cape buffalo, and rhinoceros. The Ngorongoro Crater is particularly renowned — it's one of the few places where you have a realistic chance of seeing all five in a single day. The crater's enclosed ecosystem supports approximately 25,000 large mammals in just 260 square kilometers."
          - paragraph [ref=e1709]: The Serengeti is home to one of the largest lion populations in Africa (over 3,000) and is the best place in East Africa to spot leopards, particularly in the Seronera area. Tarangire National Park is famous for its enormous elephant herds — up to 300 elephants gathering at the Tarangire River during the dry season.
          - heading "Safari Pricing Guide" [level=3] [ref=e1710]
          - paragraph [ref=e1711]: "Tanzania safari costs vary based on accommodation type, season, group size, and parks visited. Here's what to expect per person per day (all-inclusive with park fees, transport, meals, and accommodation):"
          - list [ref=e1712]:
            - listitem [ref=e1713]:
              - link "Budget camping safari" [ref=e1714] [cursor=pointer]:
                - /url: /tanzania-camping-safaris/
                - strong [ref=e1715]: Budget camping safari
              - text: ": $250-$350/day — quality tents at public campsites, campfire meals"
            - listitem [ref=e1716]:
              - link "Mid-range lodge safari" [ref=e1717] [cursor=pointer]:
                - /url: /tanzania-lodge-safaris/
                - strong [ref=e1718]: Mid-range lodge safari
              - text: ": $350-$500/day — comfortable lodges with en-suite bathrooms, restaurant dining"
            - listitem [ref=e1719]:
              - link "Luxury safari" [ref=e1720] [cursor=pointer]:
                - /url: /luxury-safaris-tanzania/
                - strong [ref=e1721]: Luxury safari
              - text: ": $500-$800+/day — exclusive tented camps and lodges with gourmet cuisine, private guides"
          - paragraph [ref=e1722]: Park fees make up a significant portion of the cost (approximately $70-$82 per person per day for major parks). Longer safaris offer better value per day since transport costs are amortized. Group departures and shared safaris offer savings of 15-25% compared to private trips.
          - heading "Best Time for a Tanzania Safari" [level=3] [ref=e1723]
          - paragraph [ref=e1724]: "Tanzania offers excellent game viewing year-round, but the experience varies by season:"
          - list [ref=e1725]:
            - listitem [ref=e1726]:
              - strong [ref=e1727]: "Peak dry season (July-October):"
              - text: Best overall wildlife viewing as animals concentrate around water sources. Excellent for the Great Migration river crossings. Higher prices and more visitors.
            - listitem [ref=e1728]:
              - strong [ref=e1729]: "Short dry season (January-February):"
              - text: Excellent for calving season, predator action, and bird watching. Fewer crowds than peak season.
            - listitem [ref=e1730]:
              - strong [ref=e1731]: "Green season (March-May):"
              - text: Lowest prices, fewest tourists, lush landscapes. Some remote areas may be harder to access. Excellent photography conditions.
            - listitem [ref=e1732]:
              - strong [ref=e1733]: "Short rains (November-December):"
              - text: Brief afternoon showers, green scenery, migratory birds arrive. Good value season with excellent game viewing.
          - heading "Combining Your Safari" [level=3] [ref=e1734]
          - paragraph [ref=e1735]: "Most travellers pair their safari with at least one other Tanzania experience, since everything is close. The three classic combinations we build all the time:"
          - list [ref=e1736]:
            - listitem [ref=e1737]:
              - strong [ref=e1738]:
                - text: Safari +
                - link "Kilimanjaro" [ref=e1739] [cursor=pointer]:
                  - /url: /mount-kilimanjaro/
              - text: ": climb first, then recover on safari. A 7-day Kilimanjaro climb plus a 4-5 day Northern Circuit safari is our most popular longer itinerary."
            - listitem [ref=e1740]:
              - strong [ref=e1741]:
                - text: Safari +
                - link "Zanzibar beach" [ref=e1742] [cursor=pointer]:
                  - /url: /zanzibar/
              - text: ": end your trip with 3-5 nights on the coast — direct flights from the Serengeti or Arusha. The perfect decompression after dawn-to-dusk game drives."
            - listitem [ref=e1743]:
              - strong [ref=e1744]: Safari + cultural experience
              - text: ": add 1-2 days with a Maasai community, a Hadzabe bushman walk at Lake Eyasi, or a coffee farm tour outside Arusha. These are the trips guests tell us they remember most."
          - heading "Why Choose Snow Africa Adventure?" [level=3] [ref=e1745]
          - paragraph [ref=e1746]: "Since 2008, Snow Africa Adventure has been providing authentic, personalized safari experiences across Tanzania. Here's what sets us apart:"
          - list [ref=e1747]:
            - listitem [ref=e1748]:
              - strong [ref=e1749]: 100% locally owned and operated
              - text: — founded by Florent and Caroline, your money supports Tanzanian families and communities directly
            - listitem [ref=e1750]:
              - strong [ref=e1751]: Expert guides with 15+ years experience
              - text: — our guides are TATO-certified, English-speaking naturalists who know every park intimately
            - listitem [ref=e1752]:
              - strong [ref=e1753]: Small group sizes
              - text: — maximum 6 per vehicle for intimate wildlife encounters and flexibility
            - listitem [ref=e1754]:
              - strong [ref=e1755]: Fully customizable itineraries
              - text: — every safari tailored to your interests, timeline, and budget
            - listitem [ref=e1756]:
              - strong [ref=e1757]: 24/7 support during your safari
              - text: — our operations team is always reachable by phone
            - listitem [ref=e1758]:
              - strong [ref=e1759]: Competitive pricing with no hidden fees
              - text: — transparent quotes with all park fees, meals, and transfers included
            - listitem [ref=e1760]:
              - strong [ref=e1761]: 4.9/5 on TripAdvisor
              - text: with 115+ verified reviews and a Travelers' Choice award
            - listitem [ref=e1762]:
              - strong [ref=e1763]: TATO licensed
              - text: (Tanzania Association of Tour Operators) and KPAP partner ensuring ethical porter treatment
          - paragraph [ref=e1764]: "Last updated: April 2026. Prices and park fee figures reflect the 2026-2027 season."
