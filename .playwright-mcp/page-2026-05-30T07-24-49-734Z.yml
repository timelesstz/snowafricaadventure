            - heading "About Tarangire National Park" [level=2] [ref=e88]
            - generic [ref=e89]:
              - paragraph [ref=e90]: Tarangire National Park is Tanzania's sixth-largest national park and one of the most underrated gems of the Northern Circuit. Named after the Tarangire River that flows through its entire length, this park is best known for its vast elephant herds — some of the largest concentrations of elephants anywhere in Tanzania — and its iconic landscape studded with enormous ancient baobab trees that have stood for thousands of years.
              - paragraph [ref=e91]: Located just 120 kilometres from Arusha along the road towards Dodoma, Tarangire is remarkably accessible yet remains far less crowded than the Serengeti or Ngorongoro, making it an ideal addition to any northern Tanzania itinerary or a destination in its own right.
              - paragraph [ref=e92]: During the dry season from June through October, the Tarangire River becomes the only reliable water source across a vast semi-arid ecosystem, drawing extraordinary concentrations of wildlife from hundreds of kilometres around. Herds of 200 to 300 elephants are a common sight at the riverbanks, while lion prides, leopards, cheetahs, and large herds of buffalo, zebra, wildebeest, impala, and giraffe converge on this lifeline. This seasonal congregation rivals the famous wildlife spectacles of the Serengeti and is one of East Africa's most underappreciated safari experiences.
              - paragraph [ref=e93]: The baobab trees of Tarangire are among the most photographed in Africa. These extraordinary trees — some estimated to be over 1,000 years old — create a surreal landscape unlike anywhere else in Tanzania. The baobabs provide food and shelter for a remarkable range of wildlife, from elephant families stripping bark with their tusks, to hornbills nesting in hollow trunks, to vervet monkeys raiding the hanging fruit. At sunset, the baobab silhouettes against the golden sky create images that stay with visitors for a lifetime.
              - paragraph [ref=e94]: Tarangire holds one of Tanzania's highest concentrations of bird species — over 550 recorded species — making it a paradise for birding enthusiasts. The park is particularly famous for its populations of yellow-collared lovebird, ashy starling, and several species found nowhere else on Tanzania's northern circuit. The riparian forest along the Tarangire River hosts spectacular concentrations of green wood-hoopoe, African broadbill, and white-headed buffalo weaver. Migrant species arrive from Europe and northern Africa between November and April, significantly swelling the bird diversity.
              - paragraph [ref=e95]: The southern section of the park near Silale Swamp offers outstanding wildlife viewing in a remote setting that few visitors reach. Here, large herds of buffalo gather in the wet season alongside fringe-eared oryx, eland, greater kudu, and the striking gerenuk. The python population in Tarangire is notable — the African rock python, Africa's largest snake reaching up to six metres, is frequently spotted in the rocky outcrops and riverine vegetation.
              - paragraph [ref=e96]: "Night game drives in Tarangire, available through select camps, reveal a completely different world of nocturnal hunters: honey badgers, genets, spring hares, aardvark, bush babies, and occasionally the elusive African wildcat emerge after dark. Walking safaris from mobile camps offer the rare opportunity to experience the park on foot — tracking wildlife through the bush with an expert guide in a way that connects you intimately with the landscape and its animal inhabitants."
              - paragraph [ref=e97]: Tarangire is best visited in combination with other northern circuit parks. A classic itinerary pairs Tarangire with Lake Manyara, Ngorongoro Crater, and the Serengeti for a comprehensive northern Tanzania experience covering all major ecosystems and wildlife spectacles. For a Kilimanjaro climbing trip combined with wildlife, a two or three-day Tarangire stop either before or after your climb makes for a perfectly balanced Tanzania adventure.
